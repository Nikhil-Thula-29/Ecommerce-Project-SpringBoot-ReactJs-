spring.application.name=E-commerce_SB

spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:test
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

spring.app.jwtSecret=MySuperSecretKeyForJwtAuthenticationThatIsAtLeast32BytesLong123
spring.app.jwtExpirationMs=300000

logging.level.org.springframework=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.nt=DEBUG

spring.ecom.app.jwtCookieName=springBootEcom
project.image=images